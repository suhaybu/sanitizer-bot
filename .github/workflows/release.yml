name: Build and Release
permissions:
  contents: write
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: sanitizer-bot
            asset_name: sanitizer-bot-linux-x86_64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: sanitizer-bot
            asset_name: sanitizer-bot-linux-aarch64
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sanitizer-bot
            asset_name: sanitizer-bot-macos-aarch64
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: staging/${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          attempt=1
          max_attempts=5
          wait_seconds=15

          while true; do
            echo "Attempt $attempt of $max_attempts..."

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists, uploading/overwriting assets."
              if gh release upload "$TAG" release-files/* --clobber; then
                gh release edit "$TAG" --latest --draft=false --prerelease=false
                echo "Release updated successfully."
                break
              fi
            else
              if gh release create "$TAG" release-files/* \
                --title "$TAG" \
                --generate-notes \
                --latest; then
                echo "Release created successfully."
                break
              fi
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "All $max_attempts attempts failed."
              exit 1
            fi

            echo "Failed, retrying in ${wait_seconds}s..."
            sleep "$wait_seconds"
            attempt=$((attempt + 1))
          done
